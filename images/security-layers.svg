<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc"><title id="title">HTTPS layer diagram</title><desc id="desc">HTTP messages are protected by TLS before moving through transport and network layers.</desc><rect width="760" height="420" rx="28" fill="#fff7f4"/><g font-family="Arial"><rect x="100" y="62" width="560" height="72" rx="18" fill="#8b0000"/><text x="380" y="107" text-anchor="middle" font-size="25" font-weight="700" fill="white">HTTP Messages</text><rect x="100" y="154" width="560" height="72" rx="18" fill="#c9a227"/><text x="380" y="199" text-anchor="middle" font-size="25" font-weight="700" fill="#251a00">TLS Protection</text><rect x="100" y="246" width="560" height="72" rx="18" fill="#333333"/><text x="380" y="291" text-anchor="middle" font-size="25" font-weight="700" fill="white">Transport Layer</text><rect x="100" y="338" width="560" height="48" rx="18" fill="#f1ded8"/><text x="380" y="369" text-anchor="middle" font-size="20" font-weight="700" fill="#5d0000">Network Path</text><path d="M380 134v20M380 226v20M380 318v20" stroke="#5d0000" stroke-width="8" stroke-linecap="round"/></g></svg>