<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc"><title id="title">HTTPS request response diagram</title><desc id="desc">Browser sends protected request through TLS to a web server and receives a response.</desc><rect width="760" height="420" rx="28" fill="#fff7f4"/><rect x="55" y="110" width="190" height="160" rx="22" fill="#8b0000"/><text x="150" y="180" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="white">Browser</text><text x="150" y="218" text-anchor="middle" font-family="Arial" font-size="18" fill="#ffe5df">Client</text><rect x="515" y="110" width="190" height="160" rx="22" fill="#262626"/><text x="610" y="180" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="white">Server</text><text x="610" y="218" text-anchor="middle" font-family="Arial" font-size="18" fill="#f3d8d0">Origin</text><path d="M265 160 C350 110 430 110 495 160" fill="none" stroke="#c9a227" stroke-width="12" stroke-linecap="round"/><path d="M495 220 C420 285 340 285 265 220" fill="none" stroke="#8b0000" stroke-width="12" stroke-linecap="round"/><polygon points="492,160 462,142 462,178" fill="#c9a227"/><polygon points="266,220 296,202 296,238" fill="#8b0000"/><text x="380" y="95" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#5d0000">HTTPS Request</text><text x="380" y="336" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#5d0000">HTTP Response</text><rect x="302" y="174" width="156" height="66" rx="16" fill="white" stroke="#c9a227" stroke-width="4"/><text x="380" y="213" text-anchor="middle" font-family="Arial" font-size="23" font-weight="700" fill="#262626">TLS</text></svg>