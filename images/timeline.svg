<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc"><title id="title">HTTP evolution timeline</title><desc id="desc">Timeline from early HTTP through HTTPS, HTTP/2, and HTTP/3.</desc><rect width="760" height="420" rx="28" fill="#fff7f4"/><line x1="82" y1="210" x2="678" y2="210" stroke="#8b0000" stroke-width="10" stroke-linecap="round"/><g font-family="Arial" font-weight="700"><circle cx="100" cy="210" r="22" fill="#8b0000"/><text x="100" y="155" text-anchor="middle" font-size="18" fill="#5d0000">0.9</text><circle cx="210" cy="210" r="22" fill="#8b0000"/><text x="210" y="275" text-anchor="middle" font-size="18" fill="#5d0000">1.0</text><circle cx="320" cy="210" r="22" fill="#8b0000"/><text x="320" y="155" text-anchor="middle" font-size="18" fill="#5d0000">1.1</text><circle cx="430" cy="210" r="22" fill="#c9a227"/><text x="430" y="275" text-anchor="middle" font-size="18" fill="#5d0000">HTTPS</text><circle cx="540" cy="210" r="22" fill="#8b0000"/><text x="540" y="155" text-anchor="middle" font-size="18" fill="#5d0000">HTTP/2</text><circle cx="650" cy="210" r="22" fill="#333"/><text x="650" y="275" text-anchor="middle" font-size="18" fill="#5d0000">HTTP/3</text></g><text x="380" y="66" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#5d0000">Protocol Evolution</text><text x="380" y="355" text-anchor="middle" font-family="Arial" font-size="20" fill="#4b5563">Simple documents → security → multiplexing → QUIC transport</text></svg>